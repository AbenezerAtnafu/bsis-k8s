apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-development

resources:
  - ../../base
  - configmap-identity-service.yaml
  - secretstore-vault.yaml
  - externalsecret-identity-service.yaml

images:
  - name: ghcr.io/habtec/bsis-identity-server
    newTag: development-latest

patchesStrategicMerge:
  - patch-deployment.yaml
  - patch-ingress.yaml
  - patch-hpa.yaml
