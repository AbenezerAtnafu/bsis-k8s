apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/environment: production
        app.kubernetes.io/instance: identity-service-production
    spec:
      containers:
        - name: app
          env:
            - name: APP_ENV
              value: production
