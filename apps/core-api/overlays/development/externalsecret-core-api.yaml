apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: core-api-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: core-api-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: bsis
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault-secret-store-core-api
  target:
    name: core-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_URL
      remoteRef:
        key: bsis/development/shared
        property: DB_URL
    - secretKey: DB_PASSWORD
      remoteRef:
        key: bsis/development/shared
        property: DB_PASSWORD
    - secretKey: RABBITMQ_USERNAME
      remoteRef:
        key: bsis/development/shared
        property: RABBITMQ_USERNAME
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: bsis/development/shared
        property: RABBITMQ_PASSWORD
    - secretKey: CLIENT_API_SECRET
      remoteRef:
        key: bsis/development/core-api
        property: CLIENT_API_SECRET
