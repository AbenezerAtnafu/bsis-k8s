apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: devices-integration-api-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: devices-integration-api-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: bsis
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault-secret-store-devices-integration-api
  target:
    name: devices-integration-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTH_CLIENT_SECRET
      remoteRef:
        key: bsis/production/devices-integration-api
        property: AUTH_CLIENT_SECRET
    - secretKey: DB_USERNAME
      remoteRef:
        key: bsis/production/shared
        property: DB_USERNAME
    - secretKey: DB_PASSWORD
      remoteRef:
        key: bsis/production/shared
        property: DB_PASSWORD
    - secretKey: RABBITMQ_USERNAME
      remoteRef:
        key: bsis/production/shared
        property: RABBITMQ_USERNAME
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: bsis/production/shared
        property: RABBITMQ_PASSWORD
